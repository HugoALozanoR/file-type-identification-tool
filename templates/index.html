<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Type Identifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: #ffffff;
    }

    #drop-zone {
      width: 420px;
      height: 200px;
      border: 2px dashed #444;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: #888;
      font-size: 0.95rem;
    }

    #drop-zone.dragover {
      border-color: #4f8ef7;
      background: #1a1f2e;
      color: #ccc;
    }

    #drop-zone svg {
      opacity: 0.4;
    }

    /* Hidden real file input triggered by clicking the drop zone */
    #file-input { display: none; }

    #result {
      width: 420px;
      border-radius: 12px;
      padding: 24px;
      display: none;
      flex-direction: column;
      gap: 12px;
      font-size: 0.9rem;
    }

    #result.safe {
      background: #0d2318;
      border: 1px solid #1e6b3a;
    }

    #result.suspicious {
      background: #2a0d0d;
      border: 1px solid #8b1a1a;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .badge.safe       { background: #1e6b3a; color: #a3ffb0; }
    .badge.suspicious { background: #8b1a1a; color: #ffaaaa; }

    .row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 8px;
    }

    .row:last-child { border-bottom: none; padding-bottom: 0; }

    .label { color: #888; }
    .value { font-family: monospace; color: #e0e0e0; }

    #spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>File Type Identifier</h1>

  <div id="drop-zone">
    <!-- Cloud upload icon -->
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 16V8m0 0-3 3m3-3 3 3"/>
      <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
    </svg>
    <span>Drop a file here or <u>click to browse</u></span>
    <input type="file" id="file-input">
  </div>

  <div id="spinner"></div>

  <div id="result">
    <div class="row">
      <span class="label">Status</span>
      <span class="value" id="r-status"></span>
    </div>
    <div class="row">
      <span class="label">File</span>
      <span class="value" id="r-file"></span>
    </div>
    <div class="row">
      <span class="label">Detected type</span>
      <span class="value" id="r-detected"></span>
    </div>
    <div class="row">
      <span class="label">Declared type</span>
      <span class="value" id="r-declared"></span>
    </div>
    <div class="row">
      <span class="label">Hex prefix</span>
      <span class="value" id="r-hex"></span>
    </div>
  </div>

  <script>
    const dropZone  = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const result    = document.getElementById('result');
    const spinner   = document.getElementById('spinner');

    // Clicking the drop zone triggers the hidden <input type="file">
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => sendFile(fileInput.files[0]));

    // Prevent the browser from opening the file when dragging over the window
    ['dragenter', 'dragover'].forEach(evt =>
      dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('dragover'); })
    );
    ['dragleave', 'drop'].forEach(evt =>
      dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('dragover'); })
    );

    // On drop, grab the first file from the DataTransfer object and send it
    dropZone.addEventListener('drop', e => sendFile(e.dataTransfer.files[0]));

    async function sendFile(file) {
      if (!file) return;

      result.style.display = 'none';
      spinner.style.display = 'block';

      // FormData encodes the file as multipart/form-data, the same format as a
      // traditional HTML form submit. Flask reads it via request.files['file'].
      const form = new FormData();
      form.append('file', file);

      // fetch() sends the POST request without reloading the page.
      // We await the JSON response and render it directly into the DOM.
      const res  = await fetch('/analyze', { method: 'POST', body: form });
      const data = await res.json();

      spinner.style.display = 'none';

      const suspicious = data.suspicious;

      result.className = suspicious ? 'suspicious' : 'safe';
      result.style.display = 'flex';

      document.getElementById('r-status').innerHTML =
        `<span class="badge ${suspicious ? 'suspicious' : 'safe'}">
          ${suspicious ? 'SUSPICIOUS' : 'SAFE'}
        </span>`;

      document.getElementById('r-file').textContent     = data.filepath;
      document.getElementById('r-detected').textContent = data.detected_type ?? 'Unknown';
      document.getElementById('r-declared').textContent = data.declared_type ?? 'Unknown';
      document.getElementById('r-hex').textContent      = data.hex_prefix;
    }
  </script>

</body>
</html>
